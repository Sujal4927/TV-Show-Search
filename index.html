<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Search App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
</head>

<body style="background-color: #032830;">
    <!-- bg-body-tertiary -->
    <nav class="navbar" style="background-color: #113a40;">
        <div class="container">
            <a class="navbar-brand" style="color: #fff;">Search TV Show </a>
            <form id="searchForm" class="d-flex" role="search">
                <input class="form-control me-2" type="text" placeholder="TV Show Title" name="query"
                    aria-label="Search" />
                <button class="btn btn-outline-info" type="submit">Search</button>
            </form>
        </div>
    </nav>

    <div id="resultImages" style="display: flex; flex-wrap: wrap; justify-content: space-around;" class="container">
    </div>



    <!-- <form id="searchForm">
        <input type="text" placeholder="TV Show Title" name="query">
        <button>Search</button>
    </form> -->
    <script src="app.js"></script>
</body>

</html>
